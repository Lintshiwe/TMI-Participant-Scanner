<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, proxy-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <title>TMI Ticket Scanner v2</title>
    <script>document.documentElement.dataset.v="2"</script>
    <!-- HTML5 QR Code Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>if(!/Mobi|Android|iPad|iPhone|iPod|tablet|webOS/i.test(navigator.userAgent)){window.location.replace('desktop-restricted.html')}</script>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header Stats Bar ─────────────────────── */
        .header {
            position: absolute; top: 0; left: 0; right: 0;
            z-index: 10; padding: 16px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-between; align-items: center;
        }
        .stats { display: flex; gap: 16px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 18px; font-weight: 700; }
        .stat-label { font-size: 10px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-valid .stat-value { color: var(--success); }
        .stat-invalid .stat-value { color: var(--danger); }

        .flash-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.15); border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; backdrop-filter: blur(10px);
        }
        .flash-btn svg { width: 20px; height: 20px; fill: white; }
        .flash-btn.active { background: var(--warning); }
        .flash-btn.active svg { fill: #000; }

        /* ── Camera Viewfinder ────────────────────── */
        #reader { 
            flex: 1; position: relative; 
            width: 100% !important; height: 100% !important;
        }
        #reader video { object-fit: cover; width: 100% !important; height: 100% !important; }
        
        #reader__dashboard_section_csr span, 
        #reader__camera_selection, 
        #reader__status_span,
        #reader__scan_region,
        #reader__dashboard_section { display: none !important; }
        #reader video { object-fit: cover !important; }

        /* ── Scan Overlay ─────────────────────────── */
        .scan-overlay {
            position: fixed; inset: 0; z-index: 5;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 28%, rgba(0,0,0,0.65) 72%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: background 0.4s;
        }

        .scan-frame {
            width: 260px; height: 260px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 24px;
            position: relative;
            transition: all 0.4s;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
        }

        /* ── Scanning Laser Line ──────────────────── */
        .scan-line {
            position: absolute; left: 10%; right: 10%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            box-shadow: 0 0 12px var(--primary);
            animation: scanMove 2s ease-in-out infinite;
            opacity: 0.85;
            z-index: 6;
        }

        @keyframes scanMove {
            0%, 100% { top: 10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            50% { top: 90%; }
        }

        /* ── Success Ring ─────────────────────────── */
        .success-ring {
            position: absolute; inset: -6px;
            border: 3px solid var(--success);
            border-radius: 30px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 4;
        }
        .success-ring.show {
            opacity: 1; transform: scale(1);
            box-shadow: 0 0 30px rgba(74,222,128,0.3);
        }

        /* ── Checkmark ──────────────────────────── */
        .checkmark {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: scale(0);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 7;
        }
        .checkmark.show { opacity: 1; transform: scale(1); }
        .checkmark svg {
            width: 70px; height: 70px;
            stroke: var(--success);
            stroke-width: 6; fill: none;
            filter: drop-shadow(0 4px 10px rgba(74,222,128,0.5));
        }
        .checkmark path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCheck 0.6s ease forwards 0.15s;
        }
        @keyframes drawCheck { to { stroke-dashoffset: 0; } }

        /* ── Status Area ──────────────────────────── */
        .status-area {
            margin-top: 24px;
            text-align: center;
            transition: all 0.3s;
        }
        .status-text {
            font-size: 22px; font-weight: 800;
            transition: all 0.3s;
            min-height: 30px;
        }
        .status-detail {
            font-size: 13px; color: rgba(255,255,255,0.5);
            margin-top: 4px; transition: all 0.3s;
            min-height: 20px;
        }

        /* ── Ticket Info ──────────────────────────── */
        .ticket-info {
            margin-top: 16px;
            padding: 14px 18px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            font-family: monospace; font-size: 13px;
            text-align: left; width: 280px;
            opacity: 0; transform: translateY(12px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .ticket-info.show { opacity: 1; transform: translateY(0); }
        .info-row {
            display: flex; justify-content: space-between;
            margin-bottom: 6px;
        }
        .info-row:last-child { margin-bottom: 0; }
        .info-label { color: rgba(255,255,255,0.4); }
        .info-value { color: white; font-weight: 600; }

        /* ── State Colors ─────────────────────────── */
        /* Scanning (default) */
        .state-analyzing .scan-frame { border-color: var(--primary); box-shadow: 0 0 20px rgba(59,130,246,0.2), 0 0 0 9999px rgba(0,0,0,0.5); }
        .state-analyzing .scan-line { animation: none; top: 50%; opacity: 0.5; }
        .state-analyzing .status-text { color: var(--primary); }

        .state-valid .scan-frame { border-color: var(--success); box-shadow: 0 0 20px rgba(74,222,128,0.3), 0 0 0 9999px rgba(0,0,0,0.5); }
        .state-valid .scan-line { background: linear-gradient(90deg, transparent, var(--success), transparent); box-shadow: 0 0 12px var(--success); animation: none; top: 50%; }
        .state-valid .status-text { color: var(--success); }

        .state-used .scan-frame { border-color: var(--warning); box-shadow: 0 0 20px rgba(251,191,36,0.3), 0 0 0 9999px rgba(0,0,0,0.5); animation: shake 0.5s ease; }
        .state-used .scan-line { background: linear-gradient(90deg, transparent, var(--warning), transparent); box-shadow: 0 0 12px var(--warning); animation: none; top: 50%; }
        .state-used .status-text { color: var(--warning); }

        .state-invalid .scan-frame { border-color: var(--danger); box-shadow: 0 0 20px rgba(248,113,113,0.3), 0 0 0 9999px rgba(0,0,0,0.5); animation: shake 0.5s ease; }
        .state-invalid .scan-line { background: linear-gradient(90deg, transparent, var(--danger), transparent); box-shadow: 0 0 12px var(--danger); animation: none; top: 50%; }
        .state-invalid .status-text { color: var(--danger); }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ── Bottom Controls ──────────────────────── */
        .controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 10; padding: 24px 20px 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex; flex-direction: column; gap: 12px;
        }

        .manual-btn {
            width: 100%; padding: 16px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px; color: white; font-size: 15px; font-weight: 600;
            cursor: pointer; backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            pointer-events: auto;
        }
        .manual-btn:active { background: rgba(255,255,255,0.2); }

        .instruction {
            text-align: center; font-size: 13px; opacity: 0.6;
        }

        /* ── Manual Entry Input ───────────────────── */
        .manual-input-modal {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px;
        }
        .manual-input-modal.show { display: flex; }

        .manual-input-modal input {
            width: 100%; max-width: 300px; padding: 16px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px; color: white; font-size: 18px; text-align: center;
            margin-bottom: 20px; outline: none;
        }
        .manual-input-modal input:focus { border-color: var(--primary); }

        .close-manual {
            margin-top: 20px; background: none; border: none;
            color: rgba(255,255,255,0.6); font-size: 14px; cursor: pointer;
        }

        @media (min-width: 768px) {
            .scan-frame { width: 320px; height: 320px; }
        }
        @media (max-width: 360px) {
            .scan-frame { width: 220px; height: 220px; }
            .ticket-info { width: 240px; }
        }
    </style>
</head>
<body>

    <!-- Header Stats -->
    <div class="header">
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Scanned</div>
            </div>
            <div class="stat-item stat-valid">
                <div class="stat-value" id="validCount">0</div>
                <div class="stat-label">Valid</div>
            </div>
            <div class="stat-item stat-invalid">
                <div class="stat-value" id="invalidCount">0</div>
                <div class="stat-label">Invalid</div>
            </div>
        </div>
        <button class="flash-btn" id="flashBtn" onclick="toggleFlash()">
            <svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
        </button>
    </div>

    <!-- Camera Viewfinder -->
    <div id="reader"></div>

    <!-- Scan Overlay (outside reader - html5-qrcode clears reader's content) -->
    <div class="scan-overlay" id="scanOverlay">
        <div class="scan-frame" id="scanFrame">
            <div class="scan-line" id="scanLine"></div>
            <div class="success-ring" id="successRing"></div>
            <div class="checkmark" id="checkmark">
                <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
            </div>
        </div>

        <div class="status-area">
            <div class="status-text" id="statusText">Scanning...</div>
            <div class="status-detail" id="statusDetail">Align QR code within the frame</div>
        </div>

        <div class="ticket-info" id="ticketInfo">
            <div class="info-row"><span class="info-label">Name</span><span class="info-value" id="tName">--</span></div>
            <div class="info-row"><span class="info-label">Team</span><span class="info-value" id="tTeam">--</span></div>
            <div class="info-row"><span class="info-label">Track</span><span class="info-value" id="tTrack">--</span></div>
            <div class="info-row"><span class="info-label">Ticket</span><span class="info-value" id="tTicket">--</span></div>
        </div>
    </div>

    <!-- Bottom Controls -->
    <div class="controls">
        <button class="manual-btn" onclick="showManualInput()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12h6M12 9v6"/></svg>
            Enter Code Manually
        </button>
        <div class="instruction">Align QR code within the frame</div>
    </div>

    <!-- Manual Input Modal -->
    <div class="manual-input-modal" id="manualModal">
        <input type="text" id="manualCode" placeholder="Enter ticket code" autocomplete="off">
        <button class="continue-btn" onclick="validateManual()">Validate</button>
        <button class="close-manual" onclick="hideManualInput()">Cancel</button>
    </div>

    <script>
        const FORM_HANDLER_URL = 'https://tmi-form-handler.netlify.app';

        let stats = { total: 0, valid: 0, invalid: 0 };
        let scanner = null;
        let isProcessing = false;
        let flashOn = false;
        let resetTimer = null;

        // ── Scanner Init ──────────────────────────────
        function initScanner() {
            if (scanner && scanner._isScanning) return;
            scanner = new Html5Qrcode("reader");
            
            scanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 }, disableFlip: false },
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                console.error("Camera error:", err);
            });
        }

        function stopScanner() {
            if (scanner && scanner._isScanning) {
                scanner.stop().catch(() => {});
            }
        }

        // ── Phase Transitions ─────────────────────────
        function setState(state) {
            const overlay = document.getElementById('scanOverlay');
            overlay.className = 'scan-overlay state-' + state;
        }

        function resetState() {
            const overlay = document.getElementById('scanOverlay');
            overlay.className = 'scan-overlay';
            document.getElementById('statusText').textContent = 'Scanning...';
            document.getElementById('statusDetail').textContent = 'Align QR code within the frame';
            document.getElementById('successRing').classList.remove('show');
            document.getElementById('checkmark').classList.remove('show');
            document.getElementById('ticketInfo').classList.remove('show');
            document.getElementById('scanFrame').style.animation = '';
        }

        // ── Scan Success ──────────────────────────────
        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            stopScanner();
            if (navigator.vibrate) navigator.vibrate(100);

            // Phase 1: Analyzing
            setState('analyzing');
            document.getElementById('statusText').textContent = 'Analyzing...';
            document.getElementById('statusDetail').textContent = 'Verifying ticket authenticity';

            // Phase 2: Backend validation
            const result = await validateTicket(decodedText);
            updateStats(result.isValid);

            // Phase 3: Show animated result
            if (result.isValid) {
                showValidResult(result);
            } else if (result.errorType === 'already_checked_in') {
                showUsedResult(result);
            } else {
                showInvalidResult(result);
            }

            clearTimeout(resetTimer);
            resetTimer = setTimeout(resetFromResult, result.isValid ? 5000 : 4000);
        }

        function onScanFailure() {}

        // ── Result Animations ─────────────────────────
        function showValidResult(result) {
            setState('valid');
            document.getElementById('statusText').textContent = 'VERIFIED';
            document.getElementById('statusDetail').textContent = 'Access granted. Welcome to TMI!';
            document.getElementById('successRing').classList.add('show');

            setTimeout(() => {
                document.getElementById('checkmark').classList.add('show');
            }, 200);

            if (result.data) {
                document.getElementById('tName').textContent = result.data.name || '--';
                document.getElementById('tTeam').textContent = result.data.teamName || '--';
                document.getElementById('tTrack').textContent = result.data.track || '--';
                document.getElementById('tTicket').textContent = result.data.ticketId || '--';
            }
            setTimeout(() => {
                document.getElementById('ticketInfo').classList.add('show');
            }, 400);

            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }

        function showUsedResult(result) {
            setState('used');
            document.getElementById('statusText').textContent = 'ALREADY CHECKED IN';
            document.getElementById('statusDetail').textContent = result.message || 'This ticket was already used';
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }

        function showInvalidResult(result) {
            setState('invalid');
            document.getElementById('statusText').textContent = 'INVALID';
            document.getElementById('statusDetail').textContent = result.message || 'Ticket could not be verified';
            if (navigator.vibrate) navigator.vibrate(300);
        }

        function resetFromResult() {
            resetState();
            initScanner();
            isProcessing = false;
        }

        // ── Backend Validation ────────────────────────
        async function validateTicket(code) {
            var ticketId = code;
            var sig = '';

            try {
                var parsed = JSON.parse(code);
                if (parsed.ticketId) { ticketId = parsed.ticketId; sig = parsed.sig || ''; }
            } catch (_) {}

            try {
                var res = await fetch(FORM_HANDLER_URL + '/api/check-in', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticketId: ticketId, sig: sig })
                });
                var result = await res.json();

                if (result.success && result.data) {
                    return { isValid: true, data: result.data };
                } else if (result.error === 'already_checked_in') {
                    return {
                        isValid: false,
                        errorType: 'already_checked_in',
                        message: result.message || 'Already checked in at ' + (result.checkedInAt || 'earlier')
                    };
                } else {
                    return { isValid: false, errorType: 'invalid', message: result.error || 'Invalid ticket' };
                }
            } catch (err) {
                return { isValid: false, errorType: 'error', message: 'Connection error. Check your connection.' };
            }
        }

        // ── Stats ─────────────────────────────────────
        async function loadStats() {
            try {
                var r = await fetch(FORM_HANDLER_URL + '/api/scanner-stats');
                var j = await r.json();
                if (j.success && j.data) stats = j.data;
            } catch (_) {}
            document.getElementById('totalCount').textContent = stats.total;
            document.getElementById('validCount').textContent = stats.valid;
            document.getElementById('invalidCount').textContent = stats.invalid;
        }

        async function persistStats() {
            try {
                await fetch(FORM_HANDLER_URL + '/api/scanner-stats', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(stats)
                });
            } catch (_) {}
        }

        function updateStats(isValid) {
            stats.total++;
            if (isValid) stats.valid++; else stats.invalid++;
            document.getElementById('totalCount').textContent = stats.total;
            document.getElementById('validCount').textContent = stats.valid;
            document.getElementById('invalidCount').textContent = stats.invalid;
            persistStats();
        }

        // ── Manual Entry ──────────────────────────────
        function showManualInput() {
            document.getElementById('manualModal').classList.add('show');
            document.getElementById('manualCode').focus();
        }

        function hideManualInput() {
            document.getElementById('manualModal').classList.remove('show');
            document.getElementById('manualCode').value = '';
        }

        async function validateManual() {
            var code = document.getElementById('manualCode').value.trim();
            if (!code) return;
            hideManualInput();

            if (isProcessing) return;
            isProcessing = true;
            stopScanner();

            setState('analyzing');
            document.getElementById('statusText').textContent = 'Analyzing...';
            document.getElementById('statusDetail').textContent = 'Verifying ticket authenticity';

            var result = await validateTicket(code);
            updateStats(result.isValid);

            if (result.isValid) { showValidResult(result); }
            else if (result.errorType === 'already_checked_in') { showUsedResult(result); }
            else { showInvalidResult(result); }

            clearTimeout(resetTimer);
            resetTimer = setTimeout(resetFromResult, result.isValid ? 5000 : 4000);
        }

        document.getElementById('manualCode')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') validateManual();
        });

        // ── Flashlight ────────────────────────────────
        async function toggleFlash() {
            var btn = document.getElementById('flashBtn');
            try {
                var track = scanner._videoElement.srcObject.getVideoTracks()[0];
                var capabilities = track.getCapabilities();
                if (!capabilities.torch) { alert('Flash not available'); return; }
                flashOn = !flashOn;
                await track.applyConstraints({ advanced: [{ torch: flashOn }] });
                btn.classList.toggle('active', flashOn);
            } catch (e) { console.error('Flash error:', e); }
        }

        // ── Init ──────────────────────────────────────
        window.addEventListener('DOMContentLoaded', async function() {
            await loadStats();
            initScanner();
        });

        document.addEventListener('visibilitychange', function() {
            if (document.hidden) { stopScanner(); }
            else if (!isProcessing) { initScanner(); }
        });
    </script>
</body>
</html>
