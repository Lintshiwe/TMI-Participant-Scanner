<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, proxy-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>TMI Ticket Scanner</title>
    <script>document.documentElement.dataset.v="5"</script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>if(!/Mobi|Android|iPad|iPhone|iPod|tablet|webOS/i.test(navigator.userAgent)){window.location.replace('desktop-restricted.html')}</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header Stats Bar ─────────────────────── */
        .header {
            position: absolute; top: 0; left: 0; right: 0;
            z-index: 10; padding: 16px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-between; align-items: center;
        }
        .stats { display: flex; gap: 16px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 18px; font-weight: 700; }
        .stat-label { font-size: 10px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-valid .stat-value { color: #4ade80; }
        .stat-invalid .stat-value { color: #f87171; }

        .flash-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.15); border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; backdrop-filter: blur(10px);
        }
        .flash-btn svg { width: 20px; height: 20px; fill: white; }
        .flash-btn.active { background: #fbbf24; }
        .flash-btn.active svg { fill: #000; }

        /* ── Camera Viewfinder ────────────────────── */
        #reader { 
            flex: 1; position: relative; 
            width: 100% !important; height: 100% !important;
        }
        #reader video { object-fit: cover; width: 100% !important; height: 100% !important; }
        
        #reader__dashboard_section_csr span, 
        #reader__camera_selection, 
        #reader__status_span { display: none !important; }

        /* ── Scan Overlay ─────────────────────────── */
        .scan-overlay {
            position: absolute; inset: 0; z-index: 5;
            pointer-events: none;
            background: transparent;
            display: flex; align-items: center; justify-content: center;
        }

        .scan-frame {
            width: 260px; height: 260px;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.92);
            transform: translateY(16px);
            transition: all 0.4s;
        }

        /* Corner Brackets */
        .corner {
            position: absolute; width: 30px; height: 30px;
            border-color: #3b82f6; border-style: solid;
            transition: all 0.3s ease;
            z-index: 6;
        }
        .corner.tl { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-radius: 12px 0 0 0; }
        .corner.tr { top: -2px; right: -2px; border-width: 4px 4px 0 0; border-radius: 0 12px 0 0; }
        .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; border-radius: 0 0 0 12px; }
        .corner.br { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-radius: 0 0 12px 0; }

        /* Scanning Laser Line */
        .scan-line {
            position: absolute; left: 10%; right: 10%; height: 2px;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
            box-shadow: 0 0 10px #3b82f6;
            animation: scanMove 2s ease-in-out infinite;
            opacity: 0.8;
            z-index: 6;
        }

        @keyframes scanMove {
            0%, 100% { top: 10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            50% { top: 90%; }
        }

        /* Success Ring */
        .success-ring {
            position: absolute; inset: -6px;
            border: 3px solid #4ade80;
            border-radius: 30px;
            opacity: 0; transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 4;
        }
        .success-ring.show { opacity: 1; transform: scale(1); box-shadow: 0 0 30px rgba(74,222,128,0.3); }

        /* Checkmark */
        .checkmark {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: scale(0);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 7;
        }
        .checkmark.show { opacity: 1; transform: scale(1); }
        .checkmark svg {
            width: 70px; height: 70px;
            stroke: #4ade80; stroke-width: 6; fill: none;
            filter: drop-shadow(0 4px 10px rgba(74,222,128,0.5));
        }
        .checkmark path { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawCheck 0.6s ease forwards 0.15s; }
        @keyframes drawCheck { to { stroke-dashoffset: 0; } }

        /* State Colors */
        .state-analyzing .corner { border-color: #3b82f6; animation: pulse 1s infinite; }
        .state-analyzing .scan-line { animation: none; top: 50%; opacity: 0.5; }

        .state-valid .corner { border-color: #4ade80; }
        .state-valid .scan-line { background: linear-gradient(90deg, transparent, #4ade80, transparent); box-shadow: 0 0 10px #4ade80; animation: none; top: 50%; }

        .state-used .corner { border-color: #fbbf24; }
        .state-used .scan-line { background: linear-gradient(90deg, transparent, #fbbf24, transparent); box-shadow: 0 0 10px #fbbf24; animation: none; top: 50%; }
        .state-used .scan-frame { animation: shake 0.5s ease; }

        .state-invalid .corner { border-color: #f87171; }
        .state-invalid .scan-line { background: linear-gradient(90deg, transparent, #f87171, transparent); box-shadow: 0 0 10px #f87171; animation: none; top: 50%; }
        .state-invalid .scan-frame { animation: shake 0.5s ease; }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ── Status Text ──────────────────────────── */
        .status-text {
            position: fixed; left: 0; right: 0; z-index: 8;
            bottom: 170px; text-align: center;
            font-size: 22px; font-weight: 800;
            transition: color 0.3s;
            text-shadow: 0 2px 12px rgba(0,0,0,0.9);
            pointer-events: none;
        }
        .status-detail {
            position: fixed; left: 0; right: 0; z-index: 8;
            bottom: 144px; text-align: center;
            font-size: 13px; color: rgba(255,255,255,0.5);
            transition: color 0.3s;
            text-shadow: 0 2px 12px rgba(0,0,0,0.9);
            pointer-events: none;
        }

        .ticket-info {
            position: fixed; left: 50%; z-index: 8;
            bottom: 60px;
            transform: translateX(-50%);
            padding: 10px 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            font-family: monospace; font-size: 12px;
            text-align: left; width: 280px;
            opacity: 0; transform: translateX(-50%) translateY(10px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }
        .ticket-info.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .info-row:last-child { margin-bottom: 0; }
        .info-label { color: rgba(255,255,255,0.35); }
        .info-value { color: white; font-weight: 600; }

        .state-analyzing .status-text { color: #3b82f6; }
        .state-valid .status-text { color: #4ade80; }
        .state-used .status-text { color: #fbbf24; }
        .state-invalid .status-text { color: #f87171; }

        /* ── Result Overlay ───────────────────────── */
        .result-overlay {
            position: fixed; inset: 0; z-index: 50;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.88); backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease;
        }
        .result-overlay.show { display: flex; }

        .result-icon {
            width: 100px; height: 100px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .result-icon.valid { background: rgba(74,222,128,0.15); box-shadow: 0 0 40px rgba(74,222,128,0.3); }
        .result-icon.used { background: rgba(251,191,36,0.15); box-shadow: 0 0 40px rgba(251,191,36,0.3); }
        .result-icon.invalid { background: rgba(248,113,113,0.15); box-shadow: 0 0 40px rgba(248,113,113,0.3); }
        .result-icon svg { width: 50px; height: 50px; stroke-width: 3; fill: none; }
        .result-icon.valid svg { stroke: #4ade80; }
        .result-icon.used svg { stroke: #fbbf24; }
        .result-icon.invalid svg { stroke: #f87171; }
        .result-icon path { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawCheck 0.6s ease forwards 0.15s; }

        .result-title {
            font-size: 26px; font-weight: 800; margin-bottom: 6px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }
        .result-valid .result-title { color: #4ade80; }
        .result-used .result-title { color: #fbbf24; }
        .result-invalid .result-title { color: #f87171; }

        .result-msg {
            font-size: 14px; color: rgba(255,255,255,0.5);
            margin-bottom: 20px; text-align: center; max-width: 280px;
        }

        .result-card {
            padding: 16px 20px; margin-bottom: 28px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; width: 280px;
        }
        .result-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; }
        .result-label { color: rgba(255,255,255,0.35); }
        .result-value { color: white; font-weight: 600; }

        .scan-next-btn {
            padding: 16px 48px; border-radius: 14px; font-size: 16px;
            font-weight: 700; cursor: pointer; border: none;
            transition: all 0.2s ease; letter-spacing: 0.5px;
        }
        .result-valid .scan-next-btn { background: #4ade80; color: #000; }
        .result-used .scan-next-btn { background: #fbbf24; color: #000; }
        .result-invalid .scan-next-btn { background: #f87171; color: #fff; }
        .scan-next-btn:active { transform: scale(0.96); }

        /* ── Bottom Controls ──────────────────────── */
        .controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 10; padding: 24px 20px 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex; flex-direction: column; gap: 12px;
        }

        .manual-btn {
            width: 100%; padding: 16px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px; color: white; font-size: 15px; font-weight: 600;
            cursor: pointer; backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .manual-btn:active { background: rgba(255,255,255,0.2); }

        .continue-btn {
            width: 100%; max-width: 300px; padding: 16px;
            background: #3b82f6; border: none; border-radius: 12px;
            color: white; font-size: 16px; font-weight: 700;
            cursor: pointer; letter-spacing: 0.5px;
        }
        .continue-btn:active { background: #2563eb; }

        .instruction {
            text-align: center; font-size: 13px; opacity: 0.6;
        }

        /* ── Manual Entry Input ───────────────────── */
        .manual-input-modal {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px;
        }
        .manual-input-modal.show { display: flex; }

        .manual-input-modal input {
            width: 100%; max-width: 300px; padding: 16px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px; color: white; font-size: 18px; text-align: center;
            margin-bottom: 20px; outline: none;
        }
        .manual-input-modal input:focus { border-color: #3b82f6; }

        .close-manual {
            margin-top: 20px; background: none; border: none;
            color: rgba(255,255,255,0.6); font-size: 14px; cursor: pointer;
        }

        @media (min-width: 768px) {
            .scan-frame { width: 320px; height: 320px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Scanned</div>
            </div>
            <div class="stat-item stat-valid">
                <div class="stat-value" id="validCount">0</div>
                <div class="stat-label">Valid</div>
            </div>
            <div class="stat-item stat-invalid">
                <div class="stat-value" id="invalidCount">0</div>
                <div class="stat-label">Invalid</div>
            </div>
        </div>
        <button class="flash-btn" id="flashBtn" onclick="toggleFlash()">
            <svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
        </button>
    </div>

    <div id="reader"></div>

    <div class="scan-overlay" id="scanOverlay">
        <div class="scan-frame" id="scanFrame">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
            <div class="scan-line" id="scanLine"></div>
            <div class="success-ring" id="successRing"></div>
            <div class="checkmark" id="checkmark">
                <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
            </div>
        </div>
    </div>

    <div class="status-text" id="statusText">Scanning...</div>
    <div class="status-detail" id="statusDetail">Align QR code within the frame</div>

    <div class="ticket-info" id="ticketInfo">
        <div class="info-row"><span class="info-label">Name</span><span class="info-value" id="tName">--</span></div>
        <div class="info-row"><span class="info-label">Team</span><span class="info-value" id="tTeam">--</span></div>
        <div class="info-row"><span class="info-label">Track</span><span class="info-value" id="tTrack">--</span></div>
        <div class="info-row"><span class="info-label">Ticket</span><span class="info-value" id="tTicket">--</span></div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-icon" id="resultIcon">
            <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <div class="result-title" id="resultTitle">VERIFIED</div>
        <div class="result-msg" id="resultMsg">Access granted. Welcome to TMI!</div>
        <div class="result-card" id="resultCard">
            <div class="result-row"><span class="result-label">Name</span><span class="result-value" id="rName">--</span></div>
            <div class="result-row"><span class="result-label">Team</span><span class="result-value" id="rTeam">--</span></div>
            <div class="result-row"><span class="result-label">Track</span><span class="result-value" id="rTrack">--</span></div>
            <div class="result-row"><span class="result-label">Ticket</span><span class="result-value" id="rTicket">--</span></div>
        </div>
        <button class="scan-next-btn" onclick="resetFromButton()">Scan Next</button>
    </div>

    <div class="controls">
        <button class="manual-btn" onclick="showManualInput()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12h6M12 9v6"/></svg>
            Enter Code Manually
        </button>
        <div class="instruction">Align QR code within the frame</div>
    </div>

    <div class="manual-input-modal" id="manualModal">
        <input type="text" id="manualCode" placeholder="Enter ticket code" autocomplete="off">
        <button class="continue-btn" onclick="validateManual()">Validate</button>
        <button class="close-manual" onclick="hideManualInput()">Cancel</button>
    </div>

    <script>
        var FORM_HANDLER_URL = 'https://tmi-form-handler.netlify.app';

        var stats = { total: 0, valid: 0, invalid: 0 };
        var scanner = null;
        var isProcessing = false;
        var flashOn = false;
        var resetTimer = null;

        var nukeObserver = null;

        function removeScanBoundary() {
            var scanRegion = document.getElementById('reader__scan_region');
            if (!scanRegion) return;
            var video = scanRegion.querySelector('video');
            var all = scanRegion.querySelectorAll('*');
            var toRemove = [];
            for (var i = 0; i < all.length; i++) {
                var el = all[i];
                if (el === video) continue;
                if (video && el.contains(video)) continue;
                if (el.id === 'reader__dashboard_section') continue;
                toRemove.push(el);
            }
            for (var i = 0; i < toRemove.length; i++) {
                try { toRemove[i].remove(); } catch(e) {}
            }
            scanRegion.style.background = 'transparent';
            if (video) {
                video.style.position = 'absolute';
                video.style.top = '0';
                video.style.left = '0';
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';
            }
        }

        function startNukeObserver() {
            var reader = document.getElementById('reader');
            if (!reader) return;
            if (nukeObserver) nukeObserver.disconnect();
            nukeObserver = new MutationObserver(function() {
                removeScanBoundary();
                var els = reader.querySelectorAll('*');
                for (var i = 0; i < els.length; i++) {
                    var s = els[i].style;
                    if (s.borderStyle === 'dashed' || s.outlineStyle === 'dashed') {
                        els[i].style.display = 'none';
                    }
                }
            });
            nukeObserver.observe(reader, { childList: true, subtree: true });
        }

        function initScanner() {
            scanner = new Html5Qrcode("reader");
            scanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 }, disableFlip: false },
                onScanSuccess,
                onScanFailure
            ).then(function() {
                startNukeObserver();
                removeScanBoundary();
            }).catch(function(err) {
                console.error("Camera error:", err);
            });
        }

        function stopScanner() {
            if (scanner && scanner._isScanning) {
                scanner.stop().catch(function() {});
            }
        }

        function setState(state) {
            document.getElementById('scanOverlay').className = 'scan-overlay state-' + state;
        }

        function resetState() {
            document.getElementById('scanOverlay').className = 'scan-overlay';
            document.getElementById('statusText').textContent = 'Scanning...';
            document.getElementById('statusDetail').textContent = 'Align QR code within the frame';
            document.getElementById('successRing').classList.remove('show');
            document.getElementById('checkmark').classList.remove('show');
            document.getElementById('ticketInfo').classList.remove('show');
            document.getElementById('resultOverlay').classList.remove('show');
        }

        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            stopScanner();
            if (navigator.vibrate) navigator.vibrate(100);

            setState('analyzing');
            document.getElementById('statusText').textContent = 'Analyzing...';
            document.getElementById('statusDetail').textContent = 'Verifying ticket authenticity';

            var result = await validateTicket(decodedText);
            updateStats(result.isValid);

            if (result.isValid) { showValidResult(result); }
            else if (result.errorType === 'already_checked_in') { showUsedResult(result); }
            else { showInvalidResult(result); }
        }

        function onScanFailure() {}

        function showValidResult(result) {
            setState('valid');
            document.getElementById('statusText').textContent = 'VERIFIED';
            document.getElementById('statusDetail').textContent = 'Access granted. Welcome to TMI!';
            document.getElementById('successRing').classList.add('show');
            setTimeout(function() { document.getElementById('checkmark').classList.add('show'); }, 200);
            if (result.data) {
                document.getElementById('tName').textContent = result.data.name || '--';
                document.getElementById('tTeam').textContent = result.data.teamName || '--';
                document.getElementById('tTrack').textContent = result.data.track || '--';
                document.getElementById('tTicket').textContent = result.data.ticketId || '--';
            }
            setTimeout(function() { document.getElementById('ticketInfo').classList.add('show'); }, 400);
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            showResultOverlay('valid', 'VERIFIED', 'Access granted. Welcome to TMI!', result.data);
        }

        function showUsedResult(result) {
            setState('used');
            document.getElementById('statusText').textContent = 'ALREADY CHECKED IN';
            document.getElementById('statusDetail').textContent = result.message || 'This ticket was already used';
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            showResultOverlay('used', 'ALREADY USED', result.message || 'This ticket has already been checked in.', result.data || result);
        }

        function showInvalidResult(result) {
            setState('invalid');
            document.getElementById('statusText').textContent = 'INVALID';
            document.getElementById('statusDetail').textContent = result.message || 'Ticket could not be verified';
            if (navigator.vibrate) navigator.vibrate(300);
            showResultOverlay('invalid', 'INVALID', result.message || 'Ticket could not be verified.', null);
        }

        function showResultOverlay(type, title, msg, data) {
            var overlay = document.getElementById('resultOverlay');
            var icon = document.getElementById('resultIcon');
            overlay.className = 'result-overlay show result-' + type;
            icon.className = 'result-icon ' + type;
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultMsg').textContent = msg;
            document.getElementById('rName').textContent = data ? (data.name || '--') : '--';
            document.getElementById('rTeam').textContent = data ? (data.teamName || '--') : '--';
            document.getElementById('rTrack').textContent = data ? (data.track || '--') : '--';
            document.getElementById('rTicket').textContent = data ? (data.ticketId || '--') : '--';
            if (data) document.getElementById('resultCard').style.display = 'block';
            else document.getElementById('resultCard').style.display = 'none';
        }

        function resetFromResult() {
            resetState();
            initScanner();
            isProcessing = false;
        }

        function resetFromButton() {
            document.getElementById('resultOverlay').classList.remove('show');
            resetFromResult();
        }

        async function validateTicket(code) {
            var ticketId = code;
            var sig = '';
            try {
                var parsed = JSON.parse(code);
                if (parsed.ticketId) { ticketId = parsed.ticketId; sig = parsed.sig || ''; }
            } catch (_) {}

            try {
                var res = await fetch(FORM_HANDLER_URL + '/api/check-in', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticketId: ticketId, sig: sig })
                });
                var result = await res.json();
                if (result.success && result.data) {
                    return { isValid: true, data: result.data };
                } else if (result.error === 'already_checked_in') {
                    return { isValid: false, errorType: 'already_checked_in', message: result.message || 'Already checked in' };
                } else {
                    return { isValid: false, errorType: 'invalid', message: result.error || 'Invalid ticket' };
                }
            } catch (err) {
                return { isValid: false, errorType: 'error', message: 'Connection error' };
            }
        }

        async function loadStats() {
            try {
                var r = await fetch(FORM_HANDLER_URL + '/api/scanner-stats');
                var j = await r.json();
                if (j.success && j.data) stats = j.data;
            } catch (_) {}
            document.getElementById('totalCount').textContent = stats.total;
            document.getElementById('validCount').textContent = stats.valid;
            document.getElementById('invalidCount').textContent = stats.invalid;
        }

        async function persistStats() {
            try {
                await fetch(FORM_HANDLER_URL + '/api/scanner-stats', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(stats)
                });
            } catch (_) {}
        }

        function updateStats(isValid) {
            stats.total++;
            if (isValid) stats.valid++; else stats.invalid++;
            document.getElementById('totalCount').textContent = stats.total;
            document.getElementById('validCount').textContent = stats.valid;
            document.getElementById('invalidCount').textContent = stats.invalid;
            persistStats();
        }

        function showManualInput() {
            document.getElementById('manualModal').classList.add('show');
            document.getElementById('manualCode').focus();
        }

        function hideManualInput() {
            document.getElementById('manualModal').classList.remove('show');
            document.getElementById('manualCode').value = '';
        }

        async function validateManual() {
            var code = document.getElementById('manualCode').value.trim();
            if (!code) return;
            hideManualInput();
            if (isProcessing) return;
            isProcessing = true;
            stopScanner();
            setState('analyzing');
            document.getElementById('statusText').textContent = 'Analyzing...';
            document.getElementById('statusDetail').textContent = 'Verifying ticket authenticity';
            var result = await validateTicket(code);
            updateStats(result.isValid);
            if (result.isValid) { showValidResult(result); }
            else if (result.errorType === 'already_checked_in') { showUsedResult(result); }
            else { showInvalidResult(result); }
            clearTimeout(resetTimer);
            resetTimer = setTimeout(resetFromResult, result.isValid ? 5000 : 4000);
        }

        document.getElementById('manualCode')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') validateManual();
        });

        async function toggleFlash() {
            var btn = document.getElementById('flashBtn');
            try {
                var track = scanner._videoElement.srcObject.getVideoTracks()[0];
                var capabilities = track.getCapabilities();
                if (!capabilities.torch) { alert('Flash not available'); return; }
                flashOn = !flashOn;
                await track.applyConstraints({ advanced: [{ torch: flashOn }] });
                btn.classList.toggle('active', flashOn);
            } catch (e) { console.error('Flash error:', e); }
        }

        window.addEventListener('DOMContentLoaded', async function() {
            await loadStats();
            initScanner();
        });

        document.addEventListener('visibilitychange', function() {
            if (document.hidden) { stopScanner(); }
            else if (!isProcessing) { initScanner(); }
        });
    </script>
</body>
</html>
