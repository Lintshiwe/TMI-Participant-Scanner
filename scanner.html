<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <title>TMI Ticket Scanner</title>
    <!-- HTML5 QR Code Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>if(!/Mobi|Android|iPad|iPhone|iPod|tablet|webOS/i.test(navigator.userAgent)){window.location.replace('desktop-restricted.html')}</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header Stats Bar ─────────────────────── */
        .header {
            position: absolute; top: 0; left: 0; right: 0;
            z-index: 10; padding: 16px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-between; align-items: center;
        }
        .stats { display: flex; gap: 16px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 18px; font-weight: 700; }
        .stat-label { font-size: 10px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-valid .stat-value { color: #4ade80; }
        .stat-invalid .stat-value { color: #f87171; }

        .flash-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.15); border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; backdrop-filter: blur(10px);
        }
        .flash-btn svg { width: 20px; height: 20px; fill: white; }
        .flash-btn.active { background: #fbbf24; }
        .flash-btn.active svg { fill: #000; }

        /* ── Camera Viewfinder ────────────────────── */
        #reader { 
            flex: 1; position: relative; 
            width: 100% !important; height: 100% !important;
        }
        #reader video { object-fit: cover; width: 100% !important; height: 100% !important; }
        
        /* Hide default library UI elements */
        #reader__dashboard_section_csr span, 
        #reader__camera_selection, 
        #reader__status_span { display: none !important; }

        /* Custom Scan Overlay */
        .scan-overlay {
            position: absolute; inset: 0; z-index: 5;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.7) 70%);
            display: flex; align-items: center; justify-content: center;
        }

        .scan-frame {
            width: 260px; height: 260px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 24px;
            position: relative;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
        }

        /* Scanning Laser Line */
        .scan-line {
            position: absolute; left: 10%; right: 10%; height: 2px;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
            box-shadow: 0 0 10px #3b82f6;
            animation: scanMove 2s ease-in-out infinite;
            opacity: 0.8;
        }

        @keyframes scanMove {
            0%, 100% { top: 10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            50% { top: 90%; }
        }

        /* Success/Error States */
        .scan-frame.success { border-color: #4ade80; box-shadow: 0 0 20px rgba(74,222,128,0.3), 0 0 0 9999px rgba(0,0,0,0.5); }
        .scan-frame.success .scan-line { background: #4ade80; box-shadow: 0 0 10px #4ade80; animation: none; top: 50%; }
        
        .scan-frame.error { border-color: #f87171; animation: shake 0.5s ease-in-out; }
        .scan-frame.error .scan-line { background: #f87171; box-shadow: 0 0 10px #f87171; animation: none; top: 50%; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* ── Bottom Controls ──────────────────────── */
        .controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 10; padding: 24px 20px 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex; flex-direction: column; gap: 12px;
        }

        .manual-btn {
            width: 100%; padding: 16px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px; color: white; font-size: 15px; font-weight: 600;
            cursor: pointer; backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .manual-btn:active { background: rgba(255,255,255,0.2); }

        .instruction {
            text-align: center; font-size: 13px; opacity: 0.6;
        }

        /* ── Loading Indicator ───────────────────── */
        .loading-overlay {
            position: fixed; inset: 0; z-index: 99;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            gap: 16px;
        }
        .loading-overlay.show { display: flex; animation: fadeIn 0.2s ease; }

        .loading-spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { color: white; font-size: 15px; font-weight: 600; opacity: 0.9; }

        /* ── Result Modal ─────────────────────────── */
        .result-modal {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
        }
        .result-modal.show { display: flex; animation: fadeIn 0.3s ease; }

        .result-icon {
            width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px; font-size: 40px;
        }
        .result-icon.valid { background: #4ade80; color: #000; }
        .result-icon.invalid { background: #f87171; color: white; }

        .result-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .result-desc { font-size: 16px; opacity: 0.8; margin-bottom: 32px; line-height: 1.5; }

        .continue-btn {
            padding: 16px 48px; background: white; color: #000;
            border: none; border-radius: 30px; font-size: 16px; font-weight: 700;
            cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ─ Manual Entry Input ───────────────────── */
        .manual-input-modal {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px;
        }
        .manual-input-modal.show { display: flex; }

        .manual-input-modal input {
            width: 100%; max-width: 300px; padding: 16px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px; color: white; font-size: 18px; text-align: center;
            margin-bottom: 20px; outline: none;
        }
        .manual-input-modal input:focus { border-color: #3b82f6; }

        .close-manual {
            margin-top: 20px; background: none; border: none;
            color: rgba(255,255,255,0.6); font-size: 14px; cursor: pointer;
        }

        @media (min-width: 768px) {
            .scan-frame { width: 320px; height: 320px; }
        }
        @media (max-width: 360px) {
            .scan-frame { width: 220px; height: 220px; }
        }
    </style>
</head>
<body>

    <!-- Header Stats -->
    <div class="header">
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Scanned</div>
            </div>
            <div class="stat-item stat-valid">
                <div class="stat-value" id="validCount">0</div>
                <div class="stat-label">Valid</div>
            </div>
            <div class="stat-item stat-invalid">
                <div class="stat-value" id="invalidCount">0</div>
                <div class="stat-label">Invalid</div>
            </div>
        </div>
        <button class="flash-btn" id="flashBtn" onclick="toggleFlash()">
            <svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
        </button>
    </div>

    <!-- Camera Viewfinder -->
    <div id="reader"></div>

    <!-- Scan Overlay -->
    <div class="scan-overlay">
        <div class="scan-frame" id="scanFrame">
            <div class="scan-line"></div>
        </div>
    </div>

    <!-- Bottom Controls -->
    <div class="controls">
        <button class="manual-btn" onclick="showManualInput()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12h6M12 9v6"/></svg>
            Enter Code Manually
        </button>
        <div class="instruction">Align QR code within the frame</div>
    </div>

    <!-- Loading Indicator -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Verifying ticket...</div>
    </div>

    <!-- Result Modal -->
    <div class="result-modal" id="resultModal">
        <div class="result-icon" id="resultIcon">✓</div>
        <div class="result-title" id="resultTitle">Ticket Valid</div>
        <div class="result-desc" id="resultDesc">Welcome to TMI Hackathon!</div>
        <button class="continue-btn" onclick="closeResult()">Continue Scanning</button>
    </div>

    <!-- Manual Input Modal -->
    <div class="manual-input-modal" id="manualModal">
        <input type="text" id="manualCode" placeholder="Enter ticket code" autocomplete="off">
        <button class="continue-btn" onclick="validateManual()">Validate</button>
        <button class="close-manual" onclick="hideManualInput()">Cancel</button>
    </div>

    <script>
        const FORM_HANDLER_URL = 'https://tmi-form-handler.netlify.app';

        let stats = JSON.parse(localStorage.getItem('tmi_scanner_stats') || '{"total":0,"valid":0,"invalid":0}');
        function persistStats() { localStorage.setItem('tmi_scanner_stats', JSON.stringify(stats)); }
        let scanner = null;
        let isProcessing = false;
        let flashOn = false;

        // Initialize Scanner
        function initScanner() {
            scanner = new Html5Qrcode("reader");
            
            const config = {
                fps: 10,
                qrbox: { width: 250, height: 250 },
                disableFlip: false
            };

            scanner.start(
                { facingMode: "environment" },
                config,
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                console.error("Camera error:", err);
                alert("Unable to access camera. Please ensure permissions are granted.");
            });
        }

        // Scan Success Handler
        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            // Visual feedback
            const frame = document.getElementById('scanFrame');
            frame.classList.add('success');
            
            // Haptic feedback if available
            if (navigator.vibrate) navigator.vibrate(200);

            // Show loading indicator
            document.getElementById('loadingOverlay').classList.add('show');

            // Validate against backend
            const result = await validateTicket(decodedText);
            
            document.getElementById('loadingOverlay').classList.remove('show');
            updateStats(result.isValid);
            showResult(result);

            // Reset after delay
            setTimeout(() => {
                frame.classList.remove('success');
                isProcessing = false;
            }, 2000);
        }

        // Scan Failure (no QR detected) - silent
        function onScanFailure(error) {
            // Do nothing - this fires constantly when no QR is in view
        }

        async function validateTicket(code) {
            var ticketId = code;
            var sig = '';

            try {
                var parsed = JSON.parse(code);
                if (parsed.ticketId) { ticketId = parsed.ticketId; sig = parsed.sig || ''; }
                if (parsed.name) { /* unused but parsed for QR compatibility */ }
            } catch (_) {}

            try {
                var res = await fetch(FORM_HANDLER_URL + '/api/check-in', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticketId: ticketId, sig: sig })
                });
                var result = await res.json();

                if (result.success && result.data) {
                    return {
                        isValid: true,
                        message: 'Welcome ' + result.data.name + '!',
                        details: 'Team: ' + (result.data.teamName || 'N/A')
                    };
                } else if (result.error === 'already_checked_in') {
                    return {
                        isValid: false,
                        message: 'Already Checked In',
                        details: 'This ticket was used at ' + (result.checkedInAt || 'earlier') + '. Attempts: ' + (result.scanAttempts || 1)
                    };
                } else {
                    return {
                        isValid: false,
                        message: 'Invalid Ticket',
                        details: result.error || 'Please verify the code and try again.'
                    };
                }
            } catch (err) {
                return {
                    isValid: false,
                    message: 'Connection Error',
                    details: 'Could not reach validation server. Check your connection.'
                };
            }
        }

        // Update Stats Display
        function updateStats(isValid) {
            stats.total++;
            if (isValid) stats.valid++; else stats.invalid++;
            
            document.getElementById('totalCount').textContent = stats.total;
            document.getElementById('validCount').textContent = stats.valid;
            document.getElementById('invalidCount').textContent = stats.invalid;
            persistStats();
        }

        // Show Result Modal
        function showResult(result) {
            const modal = document.getElementById('resultModal');
            const icon = document.getElementById('resultIcon');
            const title = document.getElementById('resultTitle');
            const desc = document.getElementById('resultDesc');

            if (result.isValid) {
                icon.className = 'result-icon valid';
                icon.textContent = '✓';
                title.textContent = 'Ticket Valid';
                title.style.color = '#4ade80';
            } else {
                icon.className = 'result-icon invalid';
                icon.textContent = '✕';
                title.textContent = 'Invalid Ticket';
                title.style.color = '#f87171';
                
                // Error shake on frame
                document.getElementById('scanFrame').classList.add('error');
                setTimeout(() => document.getElementById('scanFrame').classList.remove('error'), 500);
            }

            desc.innerHTML = `${result.message}<br><small style="opacity:0.6">${result.details}</small>`;
            modal.classList.add('show');
        }

        function closeResult() {
            document.getElementById('resultModal').classList.remove('show');
        }

        // Manual Entry
        function showManualInput() {
            document.getElementById('manualModal').classList.add('show');
            document.getElementById('manualCode').focus();
        }

        function hideManualInput() {
            document.getElementById('manualModal').classList.remove('show');
            document.getElementById('manualCode').value = '';
        }

        async function validateManual() {
            const code = document.getElementById('manualCode').value.trim();
            if (!code) return;
            
            hideManualInput();
            isProcessing = true;
            document.getElementById('loadingOverlay').classList.add('show');
            
            const result = await validateTicket(code);
            
            document.getElementById('loadingOverlay').classList.remove('show');
            updateStats(result.isValid);
            showResult(result);
            
            setTimeout(() => { isProcessing = false; }, 2000);
        }

        // Flashlight Toggle
        async function toggleFlash() {
            const btn = document.getElementById('flashBtn');
            try {
                const track = scanner._videoElement.srcObject.getVideoTracks()[0];
                const capabilities = track.getCapabilities();
                
                if (!capabilities.torch) {
                    alert("Flashlight not available on this device");
                    return;
                }

                flashOn = !flashOn;
                await track.applyConstraints({ advanced: [{ torch: flashOn }] });
                btn.classList.toggle('active', flashOn);
            } catch (err) {
                console.error("Flash error:", err);
            }
        }

        // Handle Enter key in manual input
        document.getElementById('manualCode')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') validateManual();
        });

        // Start on load
        window.addEventListener('DOMContentLoaded', initScanner);

        // Cleanup on page hide
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && scanner) {
                scanner.stop().catch(() => {});
            } else if (!document.hidden) {
                initScanner();
            }
        });

        // Display persisted stats on load
        document.getElementById('totalCount').textContent = stats.total;
        document.getElementById('validCount').textContent = stats.valid;
        document.getElementById('invalidCount').textContent = stats.invalid;
    </script>
</body>
</html>
